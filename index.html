<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Present</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, #1b1f3a, #05060f 70%);
  position: relative;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

#heart {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  cursor: pointer;
  user-select: none;
  z-index: 1000;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90%;
  max-width: 90vw;
  padding: 0 20px;
}

h1 {
  font-size: clamp(20px, 5vw, 32px);
  margin: 0;
}

p {
  opacity: 0.8;
  font-size: clamp(14px, 3vw, 18px);
}

.moon-button {
  background: none;
  border: none;
  font-size: clamp(32px, 10vw, 64px);
  cursor: pointer;
  z-index: 3001;
  opacity: 0;
  transition: opacity 1s ease-in;
  padding: 0;
  user-select: none;
}

.moon-button:active {
  transform: scale(0.9);
}

.paragraph-text {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease;
  width: 90vw;
  max-width: 500px;
  z-index: 3001;
  font-size: clamp(14px, 3vw, 18px);
  line-height: 1.6;
  padding: 0 20px;
}

.typing-text {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease;
  width: 90vw;
  max-width: 500px;
  z-index: 3001;
  font-size: clamp(16px, 4vw, 24px);
  line-height: 1.6;
  padding: 0 20px;
  white-space: pre-wrap;
  font-smoothing: antialiased;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: 0.5px;
}

.cursor {
  display: inline-block;
  width: 2px;
  background: white;
  height: 1em;
  margin-left: 2px;
  animation: blink 1s infinite;
}

.video-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;  /* ← ДОДАЙ ЧОрне тло */
  opacity: 0;
  transition: opacity 1s ease;
  pointer-events: auto;
}

.video-container video {
  width: 100%;
  height: 100%;
  object-fit: contain;  /* ← Уже правильно */
  max-width: 100vw;
  max-height: 100vh;
  aspect-ratio: 9 / 16;  /* ← ДОДАЙ телефонне співвідношення */
}

#invisibleInput {
  opacity: 0 !important;
  position: absolute;
  left: -9999px;
  width: 200px;
  color: white;
  background: transparent;
  border: none;
  border-bottom: 1px solid white;
  text-align: center;
  font-size: 18px;
  padding: 8px 0;
}
.moon-standstill-container {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 3001;
  opacity: 0;
  transition: opacity 1s ease-in;
}

.moon-standstill-title {
  font-size: clamp(20px, 5vw, 40px);
  margin: 0 0 15px 0;
  font-weight: bold;
}

.moon-standstill-subtitle {
  font-size: clamp(14px, 3vw, 20px);
  opacity: 0.7;
  margin: 0 0 30px 0;
}
.ios-play-heart {
  position: absolute;
  left: 50%;
  top: 63%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  cursor: pointer;
  user-select: none;
  z-index: 3001;
  opacity: 0;
  transition: opacity 1s ease;
  animation: heartPulse 1.5s infinite;
}

@keyframes heartPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.1); }
}

.ios-play-heart:active {
  animation: none;
  transform: translate(-50%, -50%) scale(0.9);
}
</style>
</head>

<body>

<div id="heart">🤍</div>

<audio id="music">
  <source src="song.mp3" type="audio/mpeg">

<div class="content">
  <h1></h1>

<input type="text" id="invisibleInput">

<script>

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

const isAppleDevice = isIOS();

const stars = [];

// створюємо звичайні зірки
for (let i = 0; i < 80; i++) {
  let star = document.createElement("div");
  star.className = "star";
  let x = Math.random() * 100;
  let y = Math.random() * 100;

  while (
    Math.abs(x - 50) < 3 &&
    Math.abs(y - 50) < 3
  ) {
    x = Math.random() * 100;
    y = Math.random() * 100;
  }

  star.style.left = x + "vw";
  star.style.top = y + "vh";
  star.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.body.appendChild(star);
  stars.push(star);
}

// дві особливі зірки
function createSpecialStar() {
  let s = document.createElement("div");
  s.className = "star";
  s.style.width = "4px";
  s.style.height = "4px";
  s.style.opacity = "1";
  s.style.background = "white";
  s.style.position = "absolute";
  s.style.animation = "none";
  document.body.appendChild(s);
  return s;
}

const a = createSpecialStar();
const b = createSpecialStar();

const centerX = 50;
const centerY = 50;
let orbitRadius = 30;

let ax = centerX + Math.cos(0) * orbitRadius;
let ay = centerY + Math.sin(0) * orbitRadius;
let bx = centerX + Math.cos(Math.PI) * orbitRadius;
let by = centerY + Math.sin(Math.PI) * orbitRadius;

a.style.left = ax + "vw";
a.style.top = ay + "vh";

b.style.left = bx + "vw";
b.style.top = by + "vh";

function typeText(element, text, speed, callback) {
  let index = 0;
  element.innerHTML = "";
  
  function type() {
    if (index < text.length) {
      element.innerHTML += text[index];
      index++;
      setTimeout(type, speed);
    } else {
      if (callback) callback();
    }
  }
  
  type();
}

function fadeOutText(element, duration, callback) {
  element.style.transition = `opacity ${duration}s ease-out`;
  element.style.opacity = "0";
  
  setTimeout(() => {
    if (callback) callback();
  }, duration * 1000);
}

function showParagraphs() {

    para1.className = "paragraph-text";

    document.body.appendChild(para1);
    
    setTimeout(() => {

        setTimeout(() => {
          const para2 = document.createElement("div");
          para2.className = "paragraph-text";
          para2.innerHTML = `✦<br><br>Воно розпочалося 20 червня 2024 року<br><br>Рівно через рік, у день його завершення, ми познайомилися<br><br>І мені подобається думати, що наша історія почала писатися ще тоді, коли цей цикл лише розпочинався<br><br>Наче за рік до нашої зустрічі небо вже відраховувало час до дня, коли наші шляхи нарешті перетнуться :)`;
          document.body.appendChild(para2);
          
          setTimeout(() => {
            para2.style.opacity = "1";
          }, 50);

          // КЛІК для другого абзацу
          document.addEventListener("click", function handleClick2() {

              para2.remove();

              // Абзац 3 - друкується
              setTimeout(() => {
                const para3 = document.createElement("div");
                para3.className = "typing-text";
                para3.style.opacity = "1";
                document.body.appendChild(para3);

                const fullText = `Тож і місяць, і зорі, і люди -
Усе між собою пов'язане.
«Удача!» чи «Випадок!» - кажуть усюди,
Та небо показує те, що ми `;

                typeText(para3, fullText, 150, () => {
  const continuation = document.createElement("span");
  continuation.style.color = "white";
  para3.appendChild(continuation);

  typeText(continuation, "зв'язані", 300, () => {
    setTimeout(() => {
      if (isAppleDevice) {

  showIOSPlayHeart();

} else {

  fadeOutText(para3, 2, () => {
    para3.remove();
    showVideos();
  });

}
    }, 2000); // 2 секунди затримки перед згасанням
  });
});
              }, 1000);
            });
            document.removeEventListener("click", handleClick2);
          });
        }, 1000);
      });
      document.removeEventListener("click", handleClick1);
    });
  }, 1000);
}

function showIOSPlayHeart() {
  const para3 = document.querySelector(".typing-text");

  const playHeart = document.createElement("div");
  playHeart.className = "ios-play-heart";
  playHeart.innerHTML = "🤍";

  document.body.appendChild(playHeart);

  // плавна поява
  requestAnimationFrame(() => {
    playHeart.style.opacity = "1";
  });

  playHeart.addEventListener("click", () => {

    // одночасно згасає текст і сердечко
    if (para3) {
      para3.style.transition = "opacity 1s ease";
      para3.style.opacity = "0";
    }

    playHeart.style.opacity = "0";

    setTimeout(() => {

      if (para3) para3.remove();
      playHeart.remove();

      showVideos();

    }, 1000);

  });
}
function showVideos() {
  const videos = ["video1.mp4", "video2.mp4", "video3.mp4"];

  function playVideo(index) {
    const container = document.createElement("div");
    container.className = "video-container";
    container.style.opacity = "0";
    document.body.appendChild(container);

    const video = document.createElement("video");
    video.src = videos[index];
    video.muted = false;
    video.autoplay = true;
    video.playsInline = true;
    video.volume = 1;
    video.style.transition = "opacity 3s linear";   // ← Важливо!
    container.appendChild(video);

    setTimeout(() => {
      container.style.opacity = "1";
    }, 50);
    let fadeStarted = false;

    video.addEventListener("timeupdate", () => {
      if (fadeStarted || isNaN(video.duration)) return;

      const timeLeft = video.duration - video.currentTime;

      // Починаємо fade за 3.2 секунди — щоб встиг плавно
      if (timeLeft <= 4.5) {
        fadeStarted = true;
      
        // Плавний fade відео
        video.style.opacity = "0";

        // Також трохи fade контейнера
        container.style.transition = "opacity 3s linear";
        container.style.opacity = "0";

        // Якщо це останнє відео — fade музики теж
              }
    });

    // Клік
container.addEventListener("click", () => {
  if (index < videos.length - 1) {
    video.pause();

    fadeOutText(container, 0.5, () => {
      container.remove();
      playVideo(index + 1);
    });
  } else {
    forceFadeOut(container, video);
  }
});
    // На всяк випадок
    video.addEventListener("ended", () => {
  if (index < videos.length - 1) {
    fadeOutText(container, 0.5, () => {
      container.remove();
      playVideo(index + 1);
    });
  } else {
    forceFadeOut(container, video);
  }
});

    video.load();
  }

  // Примусовий фінальний fade (якщо відео раптово закінчилось)
    // Примусовий фінальний fade (якщо відео раптово закінчилось)
  function forceFadeOut(container, video) {
    video.style.transition = "opacity 2.8s linear";
    video.style.opacity = "0";
    container.style.transition = "opacity 2.8s linear";
    container.style.opacity = "0";

    
    setTimeout(() => {
      container.remove();
      showEndingSequence();
    }, 3000);
  }

  playVideo(0);
}
function showMoonStandstill() {
  // 3 секунди після затухання музики
  setTimeout(() => {
    const container = document.createElement("div");
    container.className = "moon-standstill-container";
    document.body.appendChild(container);

    const title = document.createElement("div");
    title.className = "moon-standstill-title";
    title.textContent = "Major Lunar Standstill";
    container.appendChild(title);

    const subtitle = document.createElement("div");
    subtitle.className = "moon-standstill-subtitle";
    subtitle.textContent = "Велике місячне стояння";
    container.appendChild(subtitle);

    const button = document.createElement("div");
    button.className = "moon-button";
    button.innerHTML = "🌙";
    button.style.cursor = "pointer";
    button.style.opacity = "0";
    container.appendChild(button);

    // Потім окремо роби видимою кнопку
    setTimeout(() => {
      button.style.opacity = "1";
    }, 50);

    button.addEventListener("click", () => {
      fadeOutText(container, 1, () => {
        container.remove();
        showParagraphs();
      });
    });

    setTimeout(() => {
      container.style.opacity = "1";
    }, 50);
  }, 3000);
}

function showFinalTexts(music) {

  setTimeout(() => {
    
    const firstText = document.createElement("div");
    firstText.style.position = "absolute";
    firstText.style.left = "50%";
    firstText.style.top = "50%";
    firstText.style.transform = "translate(-50%, -50%)";
    firstText.style.fontSize = "clamp(18px, 4vw, 28px)";
    firstText.style.opacity = "1";
    firstText.style.textAlign = "center";
    firstText.style.zIndex = "3001";
    document.body.appendChild(firstText);
    
    // друкуємо перший текст дуже повільно
    typeText(firstText, "Some meetings are not accidents", 150, () => {
      
      // чекаємо 2 секунди і потім розпочинаємо fade out

        fadeOutText(firstText, 2, () => {
          firstText.remove();
          
          // чекаємо ще 3 секунди перед появою другого тексту
          setTimeout(() => {
            
            const secondText = document.createElement("div");

            secondText.style.opacity = "1";

            secondText.style.zIndex = "3001";
            document.body.appendChild(secondText);
            
            // друкуємо другий текст
            typeText(secondText, "They are written by the stars", 150, () => {
              
              // чекаємо 2 секунди перед початком fade out
              setTimeout(() => {
                // Розпочинаємо одночасно затухання тексту (6 сек) і музики (6 сек)
                fadeOutText(secondText, 6, () => {
                  secondText.remove();
                  music.pause();

                  showMoonStandstill();
                });
                
                                
                              }, 2000);
            });
            
          }, 3000); // 3 секунди затримки перед другим текстом

          typeText(thankYouText, "Дякую за кожен день поруч зі мною", 140, () => {
  setTimeout(() => {

loveText.style.position = "absolute";
loveText.style.left = "50%";
loveText.style.top = "55%";

document.body.appendChild(loveText);

setTimeout(() => {

setTimeout(() => {

}, 1200);
                
                const music = document.getElementById("music");

music.src = "song2.mp3";
music.load();
music.play();

              }, 3000);

}function startAnimation() {

  setTimeout(() => {

    let angle = 0;
    let frameCount = 0;
    const totalFrames = 1500;

    const interval = setInterval(() => {

      frameCount++;

      const progress = frameCount / totalFrames;

      const angleIncrement = 0.1 * Math.pow(progress, 2.5);
      if (progress > 0.9) {

        const boost = (progress - 0.9) / 0.1;

        angle += angleIncrement + boost * 0.15;

      } else {

        angle += angleIncrement;

      }

      orbitRadius = 30 * (1 - progress);

      ax = centerX + Math.cos(angle) * orbitRadius;
      ay = centerY + Math.sin(angle) * orbitRadius;

      bx = centerX + Math.cos(angle + Math.PI) * orbitRadius;
      by = centerY + Math.sin(angle + Math.PI) * orbitRadius;

      a.style.left = ax + "vw";
      a.style.top = ay + "vh";

      b.style.left = bx + "vw";
      b.style.top = by + "vh";

      const dist = Math.hypot(ax - bx, ay - by);

      if (dist < 0.1) {

        clearInterval(interval);

        a.remove();
        b.remove();

        // створюємо нову злиту зірку

        const mergedStar = document.createElement("div");

        mergedStar.style.position = "absolute";
        mergedStar.style.left = "50%";
        mergedStar.style.top = "50%";
        mergedStar.style.width = "12px";
        mergedStar.style.height = "12px";
        mergedStar.style.borderRadius = "50%";
        mergedStar.style.background = "white";
        mergedStar.style.transform = "translate(-50%, -50%)";
        mergedStar.style.boxShadow = "0 0 20px white";
        mergedStar.style.zIndex = "1000";

        document.body.appendChild(mergedStar);

        // легка вібрація

        if (navigator.vibrate) {
          navigator.vibrate([80, 100, 80, 100, 80, 100, 200]);
        }

        let pulse = 0;

        const pulseAnimation = setInterval(() => {

          pulse += 0.25;

          const scale =
            1 +
            Math.sin(pulse) * 0.15 +
            pulse * 0.012;

          mergedStar.style.transform =
            `translate(-50%, -50%) scale(${scale})`;

          mergedStar.style.boxShadow =
            `0 0 ${30 + pulse * 10}px white`;

        }, 30);

        // через 2.5 секунди починається спалах

        setTimeout(() => {

          clearInterval(pulseAnimation);

          const flash = document.createElement("div");

          flash.style.position = "fixed";
          flash.style.left = "0";
          flash.style.top = "0";
          flash.style.width = "100vw";
          flash.style.height = "100vh";
          flash.style.background = "white";
          flash.style.opacity = "0";
          flash.style.transition = "opacity 2s ease";
          flash.style.zIndex = "2000";

          document.body.appendChild(flash);

          requestAnimationFrame(() => {
            flash.style.opacity = "1";
          });

          // після білого спалаху - затримка 1.5 сек перед тим як він почне згасати

          setTimeout(() => {

            flash.style.opacity = "0";

            mergedStar.remove();

            setTimeout(() => {

              flash.remove();

              const container = document.createElement("div");

              container.id = "textContainer";
              container.style.position = "absolute";
              container.style.left = "50%";
              container.style.top = "50%";
              container.style.transform = "translate(-50%, -50%)";
              container.style.textAlign = "center";
              container.style.zIndex = "3000";
              container.style.transition = "all 3.5s ease";

              container.innerHTML = `
                <h1 id="dateText"
      style="
        opacity:0;
        transition:opacity 2s ease;
        margin:0;
        font-size: clamp(20px, 5vw, 40px);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      ">
    20 June 2025
  </h1>

                <p id="subtitleText"
                   style="
                     opacity:0;
                     transition:opacity 2s ease;
                     margin-top:15px;
                     color:rgba(255,255,255,.75);
                   ">
                  The stars brought us together
                </p>
              `;

              document.body.appendChild(container);

              setTimeout(() => {

                document.getElementById("dateText").style.opacity = "1";

                setTimeout(() => {

                  document.getElementById("subtitleText").style.opacity = "1";

                  // через 3 секунди після появи тексту — рухаємо вверх

                  setTimeout(() => {

                    container.style.top = "15%";
                    
                    // Запускаємо показ фінальних текстів
                    const music = document.getElementById("music");
                    showFinalTexts(music);

                  }, 3000);

                }, 1000);

              }, 100);

            }, 2000);

          }, 3300);

        }, 2500);

      }

    }, 30);

  }, 10000);

}

const heart = document.getElementById("heart");
const music = document.getElementById("music");

heart.addEventListener("click", () => {
  heart.remove();
  music.volume = 1;
  music.play();
  startAnimation();
});

</script>
